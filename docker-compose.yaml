services:
  redis:
    image: redis:7.2.1
    hostname: redis1
    container_name: github.com/PavelAgarkov/template-redis
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 2s
      retries: 2
      timeout: 2s
    networks:
      - github.com/PavelAgarkov/template

  postgres:
    image: postgres:15.0
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "clients_database"]
      interval: 10s
      timeout: 3s
      retries: 3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty12345
      POSTGRES_DB: postgres
    restart: unless-stopped
    networks:
      - github.com/PavelAgarkov/template

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: github.com/PavelAgarkov/template-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - github.com/PavelAgarkov/template

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: github.com/PavelAgarkov/template-kafka
    depends_on: [ zookeeper ]
    ports:
      - "9092:9092"   # внутренний listener для docker-сети (kafka-ui)
      - "9093:9093"   # внешний listener для клиентов с хоста (опционально)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # два PLAINTEXT-listener'а (никакого SASL/TLS)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # параметры одиночного брокера
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"

      # директория данных
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "bash", "-lc", "cub kafka-ready -b localhost:9092 1 10 >/dev/null 2>&1" ]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - github.com/PavelAgarkov/template

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: github.com/PavelAgarkov/template-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # подключаемся к внутреннему PLAINTEXT-listener'у по имени сервиса
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - github.com/PavelAgarkov/template

  mongo1:
    image: mongo:8.0
    hostname: mongo1
    container_name: github.com/PavelAgarkov/template-mongodb-1
    environment:
      MONGO_INITDB_DATABASE: mlp
    restart: unless-stopped
    ports:
      - 27017:27017
    command: [ '--replSet', 'rs0', '--bind_ip_all', '--port', '27017' ]
    logging:
      driver: none
    networks:
      - github.com/PavelAgarkov/template
    volumes:
      - mongo1-data:/data/db

  mongo2:
    image: mongo:8.0
    hostname: mongo2
    container_name: github.com/PavelAgarkov/template-mongodb-2
    environment:
      MONGO_INITDB_DATABASE: mlp
    restart: unless-stopped
    ports:
      - 27018:27018
    command: [ '--replSet', 'rs0', '--bind_ip_all', '--port', '27018' ]
    logging:
      driver: none
    networks:
      - github.com/PavelAgarkov/template
    volumes:
      - mongo2-data:/data/db

  mongosetup:
    image: mongo:8.0
    container_name: github.com/PavelAgarkov/template-mongodb-setup
    depends_on:
      - mongo1
      - mongo2
    restart: no
    entrypoint: >
      bash -c "sleep 10 && mongosh --host mongo1:27017 --eval '
      rs.initiate({
        _id: \"rs0\",
        version: 1,
        members: [
          { _id: 0, host: \"mongo1:27017\" },
          { _id: 1, host: \"mongo2:27018\"}
        ]
      });'"
    networks:
      - github.com/PavelAgarkov/template

volumes:
  mongo1-data:
  mongo2-data:
  pgdata:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  github.com/PavelAgarkov/template:
    driver: bridge
